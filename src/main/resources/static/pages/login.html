<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Welcome back · Personal Finance</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        *, *::before, *::after {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }

        :root {
          --green: #16a34a;
          --green-light: #22c55e;
          --green-pale: #f0fdf4;
          --green-border: #bbf7d0;
          --slate-900: #0f172a;
          --slate-600: #475569;
          --slate-400: #94a3b8;
          --slate-200: #e2e8f0;
          --slate-100: #f1f5f9;
          --white: #ffffff;
        }

        body {
          min-height: 100vh;
          background: #fafcf8;
          display: grid;
          grid-template-columns: 1fr 1fr;
          font-family: 'DM Sans', sans-serif;
          color: var(--slate-900);
        }

        /* ── LEFT PANEL ── */
        .left-panel {
          background: var(--green);
          display: flex;
          flex-direction: column;
          justify-content: center;
          padding: 48px 56px;
          position: relative;
          overflow: hidden;
        }

        .left-panel::before {
          content: '';
          position: absolute;
          top: -80px;
          right: -80px;
          width: 320px;
          height: 320px;
          border-radius: 50%;
          background: rgba(255,255,255,0.06);
        }

        .left-panel::after {
          content: '';
          position: absolute;
          bottom: -60px;
          left: -60px;
          width: 240px;
          height: 240px;
          border-radius: 50%;
          background: rgba(255,255,255,0.05);
        }

        .logo {
          position: absolute;
          top: 48px;
          left: 56px;
          display: flex;
          align-items: center;
          gap: 10px;
          z-index: 1;
        }

        .left-copy {
          z-index: 1;
        }

        .left-copy h1 {
          font-family: 'DM Sans', sans-serif;
          font-size: 2.4rem;
          font-weight: 600;
          line-height: 1.2;
          color: white;
          margin-bottom: 16px;
        }

        .left-copy h1 em {
          font-style: normal;
          font-weight: 300;
          opacity: 0.85;
        }

        .left-copy p {
          font-size: 0.95rem;
          color: rgba(255,255,255,0.7);
          line-height: 1.6;
          max-width: 320px;
        }

        /* ── RIGHT PANEL ── */
        .right-panel {
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 48px 40px;
        }

        .form-wrap {
          width: 100%;
          max-width: 380px;
          animation: fadeUp 0.5s ease both;
        }

        @keyframes fadeUp {
          from { opacity: 0; transform: translateY(20px); }
          to   { opacity: 1; transform: translateY(0); }
        }

        .form-header {
          margin-bottom: 36px;
        }

        .form-header h2 {
          font-family: 'DM Sans', sans-serif;
          font-size: 2rem;
          font-weight: 600;
          color: var(--slate-900);
          margin-bottom: 6px;
        }

        .form-header p {
          font-size: 0.9rem;
          color: var(--slate-600);
        }

        /* Fields */
        .field {
          margin-bottom: 20px;
        }

        .field label {
          display: block;
          font-size: 0.78rem;
          font-weight: 500;
          color: var(--slate-600);
          margin-bottom: 7px;
          letter-spacing: 0.02em;
          text-transform: uppercase;
        }

        .input-wrap {
          position: relative;
        }

        .input-wrap .ico {
          position: absolute;
          left: 16px;
          top: 50%;
          transform: translateY(-50%);
          color: var(--slate-400);
          font-size: 0.875rem;
          pointer-events: none;
          transition: color 0.2s;
        }

        .input-wrap input {
          width: 100%;
          padding: 13px 16px 13px 44px;
          border: 1.5px solid var(--slate-200);
          border-radius: 12px;
          background: var(--white);
          font-family: 'DM Sans', sans-serif;
          font-size: 0.925rem;
          color: var(--slate-900);
          transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-wrap input::placeholder {
          color: var(--slate-400);
        }

        .input-wrap input:focus {
          outline: none;
          border-color: var(--green-light);
          box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.12);
        }

        .input-wrap input:focus ~ .ico {
          color: var(--green);
        }

        .toggle-pw {
          position: absolute;
          right: 14px;
          top: 50%;
          transform: translateY(-50%);
          background: none;
          border: none;
          color: var(--slate-400);
          cursor: pointer;
          font-size: 0.875rem;
          padding: 4px;
          transition: color 0.2s;
        }

        .toggle-pw:hover { color: var(--green); }

        /* Forgot password */
        .field-footer {
          display: flex;
          justify-content: flex-end;
          margin-top: 7px;
        }

        .field-footer a {
          font-size: 0.78rem;
          color: var(--slate-400);
          text-decoration: none;
          transition: color 0.2s;
        }

        .field-footer a:hover {
          color: var(--green);
        }

        /* Submit button */
        .submit-btn {
          width: 100%;
          padding: 14px;
          background: var(--green);
          color: white;
          border: none;
          border-radius: 12px;
          font-family: 'DM Sans', sans-serif;
          font-size: 0.95rem;
          font-weight: 600;
          cursor: pointer;
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 8px;
          margin-top: 8px;
          transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
          box-shadow: 0 4px 14px rgba(22, 163, 74, 0.35);
        }

        .submit-btn:hover {
          background: #15803d;
          transform: translateY(-1px);
          box-shadow: 0 6px 18px rgba(22, 163, 74, 0.4);
        }

        .submit-btn:active {
          transform: translateY(0);
        }

        /* Message */
        #msg {
          font-size: 0.875rem;
          text-align: center;
          margin-top: 16px;
          padding: 10px 16px;
          border-radius: 10px;
          min-height: 0;
          line-height: 1.5;
          display: none;
        }

        #msg.show {
          display: block;
        }

        /* Divider + register link */
        .divider {
          display: flex;
          align-items: center;
          gap: 12px;
          margin: 24px 0;
        }

        .divider::before,
        .divider::after {
          content: '';
          flex: 1;
          height: 1px;
          background: var(--slate-200);
        }

        .divider span {
          font-size: 0.75rem;
          color: var(--slate-400);
        }

        .register-link {
          text-align: center;
          font-size: 0.9rem;
          color: var(--slate-600);
        }

        .register-link a {
          color: var(--green);
          font-weight: 600;
          text-decoration: none;
          margin-left: 4px;
        }

        .register-link a:hover {
          text-decoration: underline;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 780px) {
          body {
            grid-template-columns: 1fr;
          }

          .left-panel {
            display: none;
          }

          .right-panel {
            padding: 40px 24px;
            align-items: flex-start;
            padding-top: 60px;
          }
        }
    </style>
</head>
<body>

<!-- LEFT -->
<div class="left-panel">
    <div class="logo">
        <img src="../images/FLUX360_logo.png" alt="FLUX360" style="height:50px;width:auto;">
    </div>

    <div class="left-copy">
        <h1>Welcome<br><em>back.</em></h1>
        <p>Sign in to pick up right where you left off.</p>
    </div>


</div>

<!-- RIGHT -->
<div class="right-panel">
    <div class="form-wrap">
        <div class="form-header">
            <h2>Sign in</h2>
            <p>Enter your credentials to access your account.</p>
        </div>

        <div class="field">
            <label for="email">Email address</label>
            <div class="input-wrap">
                <input type="email" id="email" placeholder="Enter your email" autocomplete="email">
                <i class="fas fa-envelope ico"></i>
            </div>
        </div>

        <div class="field">
            <label for="password">Password</label>
            <div class="input-wrap">
                <input type="password" id="password" placeholder="Enter your passsword" autocomplete="current-password">
                <i class="fas fa-lock ico"></i>
                <button type="button" class="toggle-pw" onclick="togglePw()" tabindex="-1">
                    <i class="fas fa-eye" id="toggleIcon"></i>
                </button>
            </div>
            <div class="field-footer">
                <a href="#" onclick="alert('Password reset coming soon'); return false;">Forgot password?</a>
            </div>
        </div>

        <button class="submit-btn" onclick="login()">
            <i class="fas fa-arrow-right"></i> Sign in
        </button>

        <p id="msg"></p>

        <div class="divider"><span>or</span></div>

        <div class="register-link">
            Don't have an account?
            <a href="/pages/register.html">Create one →</a>
        </div>
    </div>
</div>

<script>
    function togglePw() {
      const input = document.getElementById('password');
      const icon  = document.getElementById('toggleIcon');
      const show  = input.type === 'password';
      input.type  = show ? 'text' : 'password';
      icon.classList.toggle('fa-eye', !show);
      icon.classList.toggle('fa-eye-slash', show);
    }

    function showMsg(text, type) {
      const el = document.getElementById('msg');
      el.textContent = text;
      el.className = 'show';
      const styles = {
        error:   { bg: '#fef2f2', color: '#b91c1c', border: '#fee2e2' },
        warn:    { bg: '#fff7ed', color: '#b45309', border: '#fed7aa' },
        success: { bg: '#f0fdf4', color: '#166534', border: '#bbf7d0' },
      };
      const s = styles[type];
      Object.assign(el.style, {
        background: s.bg, color: s.color,
        border: `1px solid ${s.border}`
      });
    }

    async function login() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();

      if (!email || !password) return showMsg('Email and password are required.', 'error');
      if (!email.includes('@') || !email.includes('.')) return showMsg('Please enter a valid email address.', 'warn');

      try {
        const res  = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (res.ok) {
          const token = data.token;
          localStorage.setItem('token', token);

          const payload = JSON.parse(atob(token.split('.')[1]));

          showMsg('Login successful! Redirecting…', 'success');

          setTimeout(() => {
            const roles =
              payload.authorities ||
              payload.roles ||
              (payload.role ? [payload.role] : []);

            window.location.href = roles.includes('ROLE_ADMIN')
              ? '/pages/admin.html'
              : '/pages/dashboard.html';
          }, 1000);

        } else {
          showMsg(data.message || 'Invalid email or password.', 'error');
        }
      } catch {
        showMsg('Server error. Please check your connection.', 'error');
      }
    }
</script>
</body>
</html>
