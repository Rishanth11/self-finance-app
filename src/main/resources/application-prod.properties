# ============================================
# FLUX360 - application-prod.properties
# ============================================

# APP
server.port=${PORT}
server.address=0.0.0.0

# DATABASE (Aiven MySQL)
spring.datasource.url=jdbc:mysql://mysql-39f97d74-rishanthflux360.a.aivencloud.com:26680/defaultdb?ssl-mode=REQUIRED
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# CONNECTION POOL (HikariCP)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.initialization-fail-timeout=10000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# SSL FIX (IMPORTANT FOR AIVEN)
spring.datasource.hikari.data-source-properties.useSSL=true
spring.datasource.hikari.data-source-properties.requireSSL=true
spring.datasource.hikari.data-source-properties.verifyServerCertificate=false

# Disable Flyway (to avoid startup DB crash)
spring.flyway.enabled=false

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# STOCK PRICE API
twelvedata.api.key=${TWELVEDATA_API_KEY}

# SCHEDULING
spring.task.scheduling.pool.size=2

# MULTIPART
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# LOGGING
logging.level.root=INFO
logging.level.com.pro.finance.selffinanceapp=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN