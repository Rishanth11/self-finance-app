# ???????????????????????????????????????????????????????????????
#   FLUX360 · application-local.properties
# ???????????????????????????????????????????????????????????????

# ?? APP ??
server.port=8081

# ?? DATABASE ??
spring.datasource.url=jdbc:mysql://localhost:3306/findb?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1806
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ?? JPA / HIBERNATE ??
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ?? CONNECTION POOL (HikariCP) ??
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ?? JWT ??
jwt.secret=flux360-super-secret-key-change-this-in-production-minimum-256-bits
jwt.expiration=86400000

# ?? STOCK PRICE API ??
twelvedata.api.key=your_twelvedata_api_key_here

# ?? SCHEDULING ??
spring.task.scheduling.pool.size=2

# ?? MULTIPART ??
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ?? LOGGING ??
logging.level.root=WARN
logging.level.com.pro.finance.selffinanceapp=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN